version: "3"

services:

  weather:
    build: .
    ports:
      - "8000:8000"
    deploy:
      replicas: 3  # simulate 3 instances
    container_name: weather-service

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"